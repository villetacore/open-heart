name: Build & Release

# Запускается при пуше тега (авто-тег из auto-tag.yml) или вручную.
on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Тег релиза (например v1.2.3)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

env:
  GODOT_VER:    "4.7-stable"
  # GODOT_SEMVER is a fallback; CI auto-detects the exact template dir from `godot --version`.
  # For Godot 4.x initial releases (patch == 0), the template dir is "major.minor.stable"
  # (NOT "major.minor.0.stable"). Example: 4.7-stable → template dir "4.7.stable".
  GODOT_SEMVER: "4.7"

# ══════════════════════════════════════════════════════════════════════════════
# Политика сбоев: каждая платформа — continue-on-error: true.
# Publish запускается при любом исходе (if: always()) и загружает
# только те артефакты, которые реально собрались.
# ══════════════════════════════════════════════════════════════════════════════

jobs:

# ── Windows x64 ───────────────────────────────────────────────────────────────
  build-windows:
    name: "Windows x64"
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> rust/target

      - name: Build Rust DLL
        run: cargo build --release
        working-directory: rust

      - name: Copy DLL → godot/bin/
        run: Copy-Item rust\target\release\openheart.dll godot\bin\openheart.dll -Force

      - name: Install Godot ${{ env.GODOT_VER }}
        shell: pwsh
        run: |
          $base = "https://github.com/godotengine/godot/releases/download/$env:GODOT_VER"
          # curl.exe more reliable than Invoke-WebRequest for large files in CI
          curl.exe -fsSL --retry 3 -o godot.zip "$base/Godot_v$($env:GODOT_VER)_win64.exe.zip"
          Expand-Archive godot.zip -DestinationPath C:\Godot -Force
          # Search recursively in case the archive has a subdirectory
          $exe = Get-ChildItem C:\Godot -Recurse -Filter "*.exe" | Select-Object -First 1
          if ($null -eq $exe) { throw "Godot exe not found in downloaded archive" }
          Copy-Item $exe.FullName C:\Godot\godot.exe -Force
          Write-Host "Godot binary: $($exe.FullName)"
          # Export templates — use GODOT_SEMVER directly (Linux CI confirmed "4.7.stable" is correct)
          curl.exe -fsSL --retry 3 -o tpl.zip "$base/Godot_v$($env:GODOT_VER)_export_templates.tpz"
          $tplDir = "$env:APPDATA\Godot\export_templates\$($env:GODOT_SEMVER).stable"
          $tplTmp = "$env:TEMP\godot_tpl"
          New-Item -ItemType Directory -Force $tplDir | Out-Null
          New-Item -ItemType Directory -Force $tplTmp  | Out-Null
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [IO.Compression.ZipFile]::ExtractToDirectory((Resolve-Path tpl.zip).Path, $tplTmp)
          Move-Item "$tplTmp\templates\*" $tplDir -Force
          Remove-Item $tplTmp -Recurse -Force
          Write-Host "Templates installed: $((Get-ChildItem $tplDir -File).Count) files"

      - name: Import assets (Windows)
        shell: pwsh
        working-directory: godot
        run: |
          Write-Host "=== Importing project assets ==="
          $p = Start-Process C:\Godot\godot.exe -ArgumentList "--headless","--import" -Wait -PassThru -NoNewWindow
          Write-Host "Import exit code: $($p.ExitCode)"
          Write-Host "=== Import complete ==="

      - name: Godot export (Windows)
        shell: pwsh
        working-directory: godot
        run: |
          New-Item -ItemType Directory -Force dist\windows | Out-Null
          $p = Start-Process C:\Godot\godot.exe `
            -ArgumentList "--headless","--export-release","Windows Desktop","dist\windows\OpenHeart.exe" `
            -Wait -PassThru -NoNewWindow
          Write-Host "Export exit code: $($p.ExitCode)"
          if ($p.ExitCode -ne 0) { Write-Warning "Export returned non-zero: $($p.ExitCode)" }

      - uses: actions/upload-artifact@v4
        with:
          name: build-windows
          path: godot/dist/windows/
          if-no-files-found: warn
          retention-days: 1

# ── Linux x64 ─────────────────────────────────────────────────────────────────
  build-linux:
    name: "Linux x64"
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> rust/target

      - name: Build Rust .so
        run: cargo build --release
        working-directory: rust

      - name: Copy .so → godot/bin/
        run: cp rust/target/release/libopenheart.so godot/bin/libopenheart.so

      - name: Install Godot ${{ env.GODOT_VER }}
        run: |
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VER}"
          wget -q "$BASE/Godot_v${GODOT_VER}_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          sudo mv "Godot_v${GODOT_VER}_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          # Auto-detect template version (4.7-stable → "4.7.stable", not "4.7.0.stable")
          GODOT_VER_STR=$(godot --version 2>&1 | head -1)
          echo "Godot version: $GODOT_VER_STR"
          TPL_VER=$(echo "$GODOT_VER_STR" | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?\.stable' | head -1)
          TPL_VER="${TPL_VER:-${GODOT_SEMVER}.stable}"
          echo "Using template dir: $TPL_VER"
          # Export templates
          wget -q "$BASE/Godot_v${GODOT_VER}_export_templates.tpz" -O tpl.zip
          TPL="$HOME/.local/share/godot/export_templates/${TPL_VER}"
          mkdir -p "$TPL"
          unzip -q tpl.zip -d /tmp/gtpl
          mv /tmp/gtpl/templates/* "$TPL/"
          echo "Templates installed: $(ls "$TPL" | wc -l) files"

      - name: Import assets (Linux)
        working-directory: godot
        run: |
          echo "=== Importing project assets ==="
          godot --headless --import 2>&1 || true
          echo "=== Import complete ==="

      - name: Godot export (Linux)
        run: |
          mkdir -p dist/linux
          godot --headless --export-release "Linux/X11" dist/linux/OpenHeart.x86_64
        working-directory: godot

      - uses: actions/upload-artifact@v4
        with:
          name: build-linux
          path: godot/dist/linux/
          if-no-files-found: warn
          retention-days: 1

# ── macOS Universal ───────────────────────────────────────────────────────────
  build-macos:
    name: "macOS Universal"
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> rust/target

      - name: Build Rust fat dylib
        run: |
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin
          lipo -create \
            target/x86_64-apple-darwin/release/libopenheart.dylib \
            target/aarch64-apple-darwin/release/libopenheart.dylib \
            -output ../godot/bin/libopenheart.dylib
        working-directory: rust

      - name: Install Godot ${{ env.GODOT_VER }}
        run: |
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VER}"
          wget -q "$BASE/Godot_v${GODOT_VER}_macos.universal.zip" -O godot.zip
          unzip -q godot.zip -d /tmp/godot_app
          sudo cp -r /tmp/godot_app/Godot.app /Applications/
          # Remove quarantine so macOS Gatekeeper doesn't block headless execution
          sudo xattr -dr com.apple.quarantine /Applications/Godot.app 2>/dev/null || true
          sudo chmod +x /Applications/Godot.app/Contents/MacOS/Godot
          GODOT=/Applications/Godot.app/Contents/MacOS/Godot
          # Auto-detect template version
          GODOT_VER_STR=$("$GODOT" --version 2>&1 | head -1)
          echo "Godot version: $GODOT_VER_STR"
          TPL_VER=$(echo "$GODOT_VER_STR" | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?\.stable' | head -1)
          TPL_VER="${TPL_VER:-${GODOT_SEMVER}.stable}"
          echo "Using template dir: $TPL_VER"
          # Export templates
          wget -q "$BASE/Godot_v${GODOT_VER}_export_templates.tpz" -O tpl.zip
          TPL="$HOME/Library/Application Support/Godot/export_templates/${TPL_VER}"
          mkdir -p "$TPL"
          unzip -q tpl.zip -d /tmp/gtpl
          mv /tmp/gtpl/templates/* "$TPL/"
          echo "Templates installed: $(ls "$TPL" | wc -l) files"

      - name: Import assets (macOS)
        working-directory: godot
        run: |
          echo "=== Importing project assets ==="
          /Applications/Godot.app/Contents/MacOS/Godot --headless --import 2>&1 || true
          echo "=== Import complete ==="

      - name: Godot export (macOS)
        run: |
          mkdir -p dist/macos
          /Applications/Godot.app/Contents/MacOS/Godot --headless \
            --export-release "macOS" dist/macos/OpenHeart.zip
        working-directory: godot

      - uses: actions/upload-artifact@v4
        with:
          name: build-macos
          path: godot/dist/macos/
          if-no-files-found: warn
          retention-days: 1

# ── Android (arm64 + armeabi-v7a) ─────────────────────────────────────────────
  build-android:
    name: "Android"
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> rust/target

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install Android NDK r23c
        run: sdkmanager "ndk;23.2.8568313"

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build Rust (arm64 + armeabi-v7a)
        run: |
          mkdir -p ../godot/bin/android
          export ANDROID_NDK_HOME="$ANDROID_SDK_ROOT/ndk/23.2.8568313"
          cargo ndk \
            -t arm64-v8a \
            -t armeabi-v7a \
            -o ../godot/bin/android \
            build --release
        working-directory: rust

      - name: Install Godot ${{ env.GODOT_VER }}
        run: |
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VER}"
          wget -q "$BASE/Godot_v${GODOT_VER}_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          sudo mv "Godot_v${GODOT_VER}_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          # Auto-detect template version
          GODOT_VER_STR=$(godot --version 2>&1 | head -1)
          echo "Godot version: $GODOT_VER_STR"
          TPL_VER=$(echo "$GODOT_VER_STR" | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?\.stable' | head -1)
          TPL_VER="${TPL_VER:-${GODOT_SEMVER}.stable}"
          echo "Using template dir: $TPL_VER"
          # Export templates
          wget -q "$BASE/Godot_v${GODOT_VER}_export_templates.tpz" -O tpl.zip
          TPL="$HOME/.local/share/godot/export_templates/${TPL_VER}"
          mkdir -p "$TPL"
          unzip -q tpl.zip -d /tmp/gtpl
          mv /tmp/gtpl/templates/* "$TPL/"
          echo "Templates installed: $(ls "$TPL" | wc -l) files"
          # Debug keystore — Godot needs it even for unsigned APKs
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null || true
          # Editor settings: SDK, JDK, keystore paths
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "$ANDROID_SDK_ROOT"
          export/android/java_sdk_path = "$JAVA_HOME"
          export/android/debug_keystore = "$HOME/.android/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Import assets (Android)
        working-directory: godot
        run: |
          echo "=== Importing project assets ==="
          godot --headless --import 2>&1 || true
          echo "=== Import complete ==="

      - name: Godot export (Android APK)
        run: |
          mkdir -p dist/android
          godot --headless --export-release "Android" dist/android/OpenHeart.apk
        working-directory: godot

      - uses: actions/upload-artifact@v4
        with:
          name: build-android
          path: godot/dist/android/
          if-no-files-found: warn
          retention-days: 1

# ── Web / HTML5 ───────────────────────────────────────────────────────────────
  build-web:
    name: "Web (HTML5)"
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten 3.1.39
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.39
          actions-cache-folder: emsdk-cache

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-emscripten
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> rust/target

      - name: Build Rust WASM
        run: |
          mkdir -p ../godot/bin/web
          cargo build -Z build-std=std,panic_abort \
            --release \
            --target wasm32-unknown-emscripten
          cp target/wasm32-unknown-emscripten/release/libopenheart.so \
             ../godot/bin/web/libopenheart.wasm
        working-directory: rust
        env:
          EMCC_CFLAGS: "-sSIDE_MODULE=2 -O2"

      - name: Install Godot ${{ env.GODOT_VER }}
        run: |
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VER}"
          wget -q "$BASE/Godot_v${GODOT_VER}_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          sudo mv "Godot_v${GODOT_VER}_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          # Auto-detect template version
          GODOT_VER_STR=$(godot --version 2>&1 | head -1)
          echo "Godot version: $GODOT_VER_STR"
          TPL_VER=$(echo "$GODOT_VER_STR" | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?\.stable' | head -1)
          TPL_VER="${TPL_VER:-${GODOT_SEMVER}.stable}"
          echo "Using template dir: $TPL_VER"
          # Export templates
          wget -q "$BASE/Godot_v${GODOT_VER}_export_templates.tpz" -O tpl.zip
          TPL="$HOME/.local/share/godot/export_templates/${TPL_VER}"
          mkdir -p "$TPL"
          unzip -q tpl.zip -d /tmp/gtpl
          mv /tmp/gtpl/templates/* "$TPL/"
          echo "Templates installed: $(ls "$TPL" | wc -l) files"

      - name: Import assets (Web)
        working-directory: godot
        run: |
          echo "=== Importing project assets ==="
          godot --headless --import 2>&1 || true
          echo "=== Import complete ==="

      - name: Godot export (Web)
        run: |
          mkdir -p dist/web
          godot --headless --export-release "Web" dist/web/index.html
        working-directory: godot

      - uses: actions/upload-artifact@v4
        with:
          name: build-web
          path: godot/dist/web/
          if-no-files-found: warn
          retention-days: 1

# ── Publish: GitHub Release ───────────────────────────────────────────────────
# Запускается при ЛЮБОМ исходе билдов (if: always()).
# Каждый download-artifact — continue-on-error: true.
# Упаковываем только те файлы, которые реально скачались.
# softprops/action-gh-release загружает по glob — отсутствующие файлы не ломают релиз.
  publish:
    name: "Publish Release"
    needs: [build-windows, build-linux, build-macos, build-android, build-web]
    runs-on: ubuntu-24.04
    if: always()

    env:
      ITCH_IO_API_KEY: ${{ secrets.ITCH_IO_API_KEY }}
      ITCH_IO_USER:    ${{ secrets.ITCH_IO_USER }}

    steps:
      # ── Определяем тег ──────────────────────────────────────────────────────
      - name: Resolve tag
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ inputs.tag }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG"

      # ── Скачиваем артефакты (continue-on-error на каждом) ───────────────────
      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: build-windows
          path: artifacts/build-windows
        continue-on-error: true

      - name: Download Linux
        uses: actions/download-artifact@v4
        with:
          name: build-linux
          path: artifacts/build-linux
        continue-on-error: true

      - name: Download macOS
        uses: actions/download-artifact@v4
        with:
          name: build-macos
          path: artifacts/build-macos
        continue-on-error: true

      - name: Download Android
        uses: actions/download-artifact@v4
        with:
          name: build-android
          path: artifacts/build-android
        continue-on-error: true

      - name: Download Web
        uses: actions/download-artifact@v4
        with:
          name: build-web
          path: artifacts/build-web
        continue-on-error: true

      # ── Упаковываем только то, что скачалось ────────────────────────────────
      - name: Package artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          ls artifacts/ 2>/dev/null || echo "(none)"

          cd artifacts

          if [ -d build-windows ] && [ "$(ls -A build-windows 2>/dev/null)" ]; then
            zip -r ../OpenHeart-windows-x64.zip build-windows/
            echo "✓ windows"
          else echo "✗ windows (skipped)"; fi

          if [ -d build-linux ] && [ "$(ls -A build-linux 2>/dev/null)" ]; then
            tar -czf ../OpenHeart-linux-x64.tar.gz build-linux/
            echo "✓ linux"
          else echo "✗ linux (skipped)"; fi

          if [ -f build-macos/OpenHeart.zip ]; then
            cp build-macos/OpenHeart.zip ../OpenHeart-macos-universal.zip
            echo "✓ macos"
          elif [ -d build-macos ] && [ "$(ls -A build-macos 2>/dev/null)" ]; then
            zip -r ../OpenHeart-macos-universal.zip build-macos/
            echo "✓ macos (zipped)"
          else echo "✗ macos (skipped)"; fi

          if [ -f build-android/OpenHeart.apk ]; then
            cp build-android/OpenHeart.apk ../OpenHeart-android.apk
            echo "✓ android"
          else echo "✗ android (skipped)"; fi

          if [ -d build-web ] && [ "$(ls -A build-web 2>/dev/null)" ]; then
            zip -r ../OpenHeart-web.zip build-web/
            echo "✓ web"
          else echo "✗ web (skipped)"; fi

          echo "=== Packaged files ==="
          ls -lh ../*.zip ../*.tar.gz ../*.apk 2>/dev/null || echo "(no files packaged)"

      # ── GitHub Release ───────────────────────────────────────────────────────
      # auto-tag.yml уже создал релиз — мы просто прикрепляем артефакты.
      # make_latest: false — не трогаем «latest», авто-тег уже поставил.
      - name: Attach artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:               ${{ steps.ver.outputs.tag }}
          name:                   "OpenHeart ${{ steps.ver.outputs.tag }}"
          draft:                  false
          prerelease:             ${{ contains(steps.ver.outputs.tag, 'alpha') || contains(steps.ver.outputs.tag, 'beta') || contains(steps.ver.outputs.tag, 'rc') }}
          fail_on_unmatched_files: false
          make_latest:            true
          files: |
            OpenHeart-*.zip
            OpenHeart-*.tar.gz
            OpenHeart-*.apk

      # ── itch.io (только если секреты настроены и артефакт существует) ────────
      - name: itch.io → Windows
        if: env.ITCH_IO_API_KEY != '' && env.ITCH_IO_USER != '' && hashFiles('artifacts/build-windows/**') != ''
        uses: KikimoraGames/itch-publish@v0.0.3
        with:
          butlerApiKey:  ${{ secrets.ITCH_IO_API_KEY }}
          gameData:      artifacts/build-windows/
          itchUsername:  ${{ secrets.ITCH_IO_USER }}
          itchGameId:    openheart
          buildChannel:  windows
          buildNumber:   ${{ steps.ver.outputs.tag }}

      - name: itch.io → Linux
        if: env.ITCH_IO_API_KEY != '' && env.ITCH_IO_USER != '' && hashFiles('artifacts/build-linux/**') != ''
        uses: KikimoraGames/itch-publish@v0.0.3
        with:
          butlerApiKey:  ${{ secrets.ITCH_IO_API_KEY }}
          gameData:      artifacts/build-linux/
          itchUsername:  ${{ secrets.ITCH_IO_USER }}
          itchGameId:    openheart
          buildChannel:  linux
          buildNumber:   ${{ steps.ver.outputs.tag }}

      - name: itch.io → macOS
        if: env.ITCH_IO_API_KEY != '' && env.ITCH_IO_USER != '' && hashFiles('artifacts/build-macos/**') != ''
        uses: KikimoraGames/itch-publish@v0.0.3
        with:
          butlerApiKey:  ${{ secrets.ITCH_IO_API_KEY }}
          gameData:      artifacts/build-macos/
          itchUsername:  ${{ secrets.ITCH_IO_USER }}
          itchGameId:    openheart
          buildChannel:  macos
          buildNumber:   ${{ steps.ver.outputs.tag }}

      - name: itch.io → Web
        if: env.ITCH_IO_API_KEY != '' && env.ITCH_IO_USER != '' && hashFiles('artifacts/build-web/**') != ''
        uses: KikimoraGames/itch-publish@v0.0.3
        with:
          butlerApiKey:  ${{ secrets.ITCH_IO_API_KEY }}
          gameData:      artifacts/build-web/
          itchUsername:  ${{ secrets.ITCH_IO_USER }}
          itchGameId:    openheart
          buildChannel:  html5
          buildNumber:   ${{ steps.ver.outputs.tag }}

      - name: itch.io → Android
        if: env.ITCH_IO_API_KEY != '' && env.ITCH_IO_USER != '' && hashFiles('OpenHeart-android.apk') != ''
        uses: KikimoraGames/itch-publish@v0.0.3
        with:
          butlerApiKey:  ${{ secrets.ITCH_IO_API_KEY }}
          gameData:      OpenHeart-android.apk
          itchUsername:  ${{ secrets.ITCH_IO_USER }}
          itchGameId:    openheart
          buildChannel:  android
          buildNumber:   ${{ steps.ver.outputs.tag }}
