; OpenHeart — Godot 4.7 export presets
; Сгенерировано для CI/CD. Для подписи (codesign, Android keystore) —
; заполни секции codesign/keystore вручную или через Godot Editor.

[preset.0]
name="Windows Desktop"
platform="Windows Desktop"
runnable=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
